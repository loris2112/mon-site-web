<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulaire d'inscription</title>
    <link rel="stylesheet" href="formulaire.css">
</head>
<body>
<h1>Formulaire utilisateur</h1>
 <form action="https://formspree.io/f/xeebqvkj" method="POST">
  <p>
    Cochez les aliments que vous aimez manger :<br />
    <input type="checkbox" name="frites" id="frites" /> <label for="frites">Frites</label><br />
    <input type="checkbox" name="steak" id="steak" /> <label for="steak">Steak haché</label><br/>
    <input type="checkbox" name="epinards" id="epinards" /> <label for="epinards">Épinards</label><br />
    <input type="checkbox" name="huitres" id="huitres" /> <label for="huitres">Huîtres</label>
 </p>   
   <p>
    Veuillez indiquer la tranche d'âge dans laquelle vous vous situez :<br />
    <input type="radio" name="age" value="moins15" id="moins15"  required /> <label for="moins15">Moins de 15 ans</label><br/>
    <input type="radio" name="age" value="medium15-25" id="medium15-25" /> <label for="medium15-25">15-25
ans</label><br/>
    <input type="radio" name="age" value="medium25-40" id="medium25-40" /> <label for="medium25-40">25-40
ans</label><br />
    <input type="radio" name="age" value="plus40" id="plus40" /> <label for="plus40">Encore plus vieux que ça ?!</label>
  </p>
  <p>
   Sur quel continent habitez-vous ?<br />
   <input type="radio" name="continent" value="europe" id="europe" required/> <label
for="europe">Europe</label><br />
   <input type="radio" name="continent" value="afrique" id="afrique" /> <label for="afrique">Afrique</label><br />
   <input type="radio" name="continent" value="asie" id="asie" /> <label for="asie">Asie</label><br />
   <input type="radio" name="continent" value="amerique" id="amerique" /> <label for="amerique">Amérique</label><br
/>
   <input type="radio" name="continent" value="australie" id="australie" /> <label for="australie">Australie</label>
 </p>

   <p>
    <label for="pays">Dans quel pays habitez-vous ?</label><br/>
    <select name="pays" id="pays">
     <option value="france">France</option>
     <option value="espagne">Espagne</option>
     <option value="italie">Italie</option>
     <option value="royaume-uni">Royaume-Uni</option>
     <option value="canada">Canada</option>
     <option value="etats-unis">Etats-Unis</option>
     <option value="chine">Chine</option>
     <option value="japon">Japon</option>
     <option value="benin">Bénin</option>
     
    </select>
  </p>
 
   <fieldset>
     <legend>Vos coordonnées</legend>
     
     <label for="nom">Quel est votre nom ?</label><br/>
     <input type="text" name="nom" id="nom" tabindex="10" placeholder="Entrez votre nom" required /><br />
 
     <label for="prenom">Quel est votre prénom ?</label><br/>
     <input type="text" name="prenom" id="prenom" tabindex="20"  placeholder="Entrez votre prénom" required/><br />
 
     <label for="email">Quel est votre e-mail ?</label><br/>
     <input type="email" name="email" id="email" tabindex="30" placeholder="exemple@mail.com" required /><br />
  </fieldset> 
  <fieldset>
    <legend>Votre souhait</legend>
    <p>
     Faites un souhait que vous voudriez voir exaucé :<br />
     <input type="radio" name="souhait" value="riche" id="riche" tabindex="40"  required/> <label for="riche">Être
riche</label><br/>
     <input type="radio" name="souhait" value="celebre" id="celebre" tabindex="50" /> <label for="celebre">Être
célèbre</label><br/>
     <input type="radio" name="souhait" value="intelligent" id="intelligent" tabindex="60" /> <label
for="intelligent">Être encore plus intelligent</label><br/>
     <input type="radio" name="souhait" value="autre" id="autre" tabindex="70" /> <label
for="autre">Autre...</label><br />
   <textarea name="precisions" id="precisions" cols="40" rows="4" tabindex="80" placeholder="Précisez votre souhait ici"></textarea>
   </p>
 </fieldset>
  <p>
    <label for="message">Un commentaire ?</label><br>
    <textarea id="message" name="message" rows="5" cols="40" placeholder="Écrivez votre message ici"></textarea>
</p>
 <p>
  <input type="submit" value="Envoyer"> 
  <input type="reset" value="Réinitialiser">
 </p>
 </form>
</body>
</html>
